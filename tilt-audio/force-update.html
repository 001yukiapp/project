<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Tilt Audio Force Update</title>
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f4f1ea;
        color: #14211d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(520px, 100%);
        border: 1px solid #d9d2c2;
        border-radius: 8px;
        background: #fffdf8;
        padding: 20px;
      }
      h1 { margin: 0 0 8px; font-size: 1.35rem; }
      p { margin: 8px 0; line-height: 1.6; }
      a, button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 12px;
        padding: 0 14px;
        border: 1px solid #0f6b55;
        border-radius: 8px;
        background: #0f6b55;
        color: #fff;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>更新中 v008</h1>
      <p id="status">古いService Workerとキャッシュを削除しています。</p>
      <button id="retry" type="button" hidden>もう一度実行</button>
    </main>
    <script>
      "use strict";

      async function clearTiltAudioCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => {
            const scope = registration.scope || "";
            if (scope.includes("/project/tilt-audio/") || scope.includes("/tilt-audio/")) {
              return registration.unregister();
            }
            return Promise.resolve(false);
          }));
        }

        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => {
            if (name.startsWith("tilt-audio-pwa-")) return caches.delete(name);
            return Promise.resolve(false);
          }));
        }
      }

      async function run() {
        const status = document.getElementById("status");
        const retry = document.getElementById("retry");
        try {
          await clearTiltAudioCache();
          status.textContent = "削除完了。最新版を読み込みます。";
          window.location.replace("./index.html?force=v008-" + Date.now());
        } catch (error) {
          status.textContent = "自動更新に失敗しました。もう一度実行してください。";
          retry.hidden = false;
        }
      }

      document.getElementById("retry").addEventListener("click", run);
      run();
    </script>
  </body>
</html>
