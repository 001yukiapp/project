<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Project Control Mini v2</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">PROJECT CONTROL</p>
        <h1>ProjectControl</h1>
        <p id="appVersion" class="version-label">Version</p>
      </div>
      <button id="exportBtn" class="ghost">JSONバックアップ</button>
    </header>

    <section class="summary">
      <div class="summary-card">
        <span id="projectCount">0</span>
        <small>プロジェクト</small>
      </div>
      <div class="summary-card">
        <span id="activeTaskCount">0</span>
        <small>未完了タスク</small>
      </div>
      <div class="summary-card">
        <span id="doneRate">0%</span>
        <small>全体進捗</small>
      </div>
    </section>

    <main>
      <section id="focusArea" class="focus-area"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>Projects</h2>
          <div class="row gap">
            <button id="addProjectBtn" class="primary small">プロジェクト追加</button>
          </div>
        </div>
        <div class="filters tree-filters">
          <button class="tree-filter active" data-tree-filter="all">全部</button>
          <button class="tree-filter" data-tree-filter="open">未完了</button>
          <button class="tree-filter" data-tree-filter="high">高優先度</button>
          <button class="tree-filter" data-tree-filter="focus">今日やる</button>
          <button class="tree-filter" data-tree-filter="blocked">詰まり中</button>
        </div>
        <div id="projectTree" class="project-tree"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>アイデア箱</h2>
          <button id="openIdeaBtn" class="primary small">＋アイデア</button>
        </div>
        <div id="ideaList" class="idea-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>GitHubリポジトリ箱</h2>
          <div class="row gap">
            <button id="fetchReposBtn" class="primary small">GitHubから取得</button>
            <button id="addRepoBtn" class="ghost small">リポジトリ追加</button>
          </div>
        </div>
        <p id="repoSyncStatus" class="hint"></p>
        <div id="repoList" class="repo-list"></div>
      </section>

      <section class="panel sticky-panel">
        <div class="panel-head">
          <h2>ChatGPT連携</h2>
          <button id="copyForChatGPTBtn" class="primary small">コピー</button>
        </div>
        <p class="hint">
          今日の集中、詰まり中、プロジェクトツリー、アイデア箱、GitHubリポジトリ箱をまとめて共有できます。
        </p>
        <textarea id="chatgptPayload" readonly></textarea>
        <div class="row gap">
          <button id="downloadProgressBtn" class="ghost">進捗TXT保存</button>
          <button id="selectPayloadBtn" class="ghost">選択</button>
        </div>
      </section>

      <section class="panel">
        <h2>全体メモ</h2>
        <textarea id="globalMemo" placeholder="迷ったこと、あとで考えること、思いついたアイデアを書いておく"></textarea>
      </section>

      <section class="panel danger-zone">
        <h2>データ</h2>
        <div class="row gap">
          <label class="file-label">
            JSONインポート
            <input id="importFile" type="file" accept="application/json" />
          </label>
          <button id="resetBtn" class="danger">初期化</button>
        </div>
        <p class="hint">データはこの端末のブラウザ内に保存。サーバーには送信しません。</p>
      </section>
    </main>
  </div>

  <dialog id="taskDialog">
    <form method="dialog" id="taskForm">
      <h2 id="taskDialogTitle">タスク追加</h2>
      <input id="taskTitle" required placeholder="タスク名 例：ホーム画面モックを作る" />
      <textarea id="taskNote" placeholder="メモ"></textarea>
      <div class="grid2">
        <label>状態
          <select id="taskStatus">
            <option value="todo">未着手</option>
            <option value="doing">作業中</option>
            <option value="done">完了</option>
          </select>
        </label>
        <label>優先度
          <select id="taskPriority">
            <option value="high">高</option>
            <option value="mid">中</option>
            <option value="low">低</option>
          </select>
        </label>
      </div>
      <label>期限
        <input id="taskDue" type="date" />
      </label>
      <menu>
        <button value="cancel" class="ghost">キャンセル</button>
        <button id="saveTaskBtn" value="default" class="primary">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="ideaDialog" class="idea-dialog">
    <form method="dialog" id="ideaForm">
      <h2 id="ideaDialogTitle">アイデア追加</h2>
      <label>アイデア本文
        <input id="ideaTitle" required placeholder="思いついたことをポンと入れる" />
      </label>
      <label>紐づけるプロジェクト
        <select id="ideaProject"></select>
      </label>
      <label>フェーズ
        <select id="ideaPhase"></select>
      </label>
      <label>メモ
        <textarea id="ideaNote" placeholder="補足、きっかけ、あとで調べること"></textarea>
      </label>
      <label>優先度
        <select id="ideaPriority">
          <option value="high">高</option>
          <option value="mid" selected>中</option>
          <option value="low">低</option>
        </select>
      </label>
      <menu class="idea-menu">
        <button value="cancel" class="ghost">キャンセル</button>
        <button id="saveIdeaContinueBtn" value="default" class="ghost">保存して続ける</button>
        <button id="saveIdeaBtn" value="default" class="primary">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="repoDialog">
    <form method="dialog" id="repoForm">
      <h2 id="repoDialogTitle">リポジトリ追加</h2>
      <label>GitHub URL / fullName
        <input id="repoUrl" placeholder="https://github.com/001yukiapp/project" />
      </label>
      <label>リポジトリ名
        <input id="repoName" required placeholder="project" />
      </label>
      <label>説明
        <textarea id="repoDescription" placeholder="何のリポジトリか"></textarea>
      </label>
      <div class="grid2">
        <label>プロジェクト
          <select id="repoProject"></select>
        </label>
        <label>フェーズ
          <select id="repoPhase"></select>
        </label>
      </div>
      <div class="grid2">
        <label>状態
          <select id="repoStatus">
            <option value="active">active</option>
            <option value="paused">paused</option>
            <option value="released">released</option>
            <option value="broken">broken</option>
            <option value="idea">idea</option>
            <option value="archived">archived</option>
          </select>
        </label>
        <label>種類
          <select id="repoType">
            <option value="app">app</option>
            <option value="pwa">pwa</option>
            <option value="website">website</option>
            <option value="tool">tool</option>
            <option value="experiment">experiment</option>
            <option value="article">article</option>
            <option value="other">other</option>
          </select>
        </label>
      </div>
      <label>優先度
        <select id="repoPriority">
          <option value="high">高</option>
          <option value="mid" selected>中</option>
          <option value="low">低</option>
        </select>
      </label>
      <label>次の一手
        <textarea id="repoNextAction" placeholder="Codexに次に頼みたいこと"></textarea>
      </label>
      <label>Codex依頼文
        <textarea id="repoCodexPrompt" placeholder="空なら自動生成します"></textarea>
      </label>
      <label>メモ
        <textarea id="repoMemo"></textarea>
      </label>
      <menu>
        <button value="cancel" class="ghost">キャンセル</button>
        <button id="saveRepoBtn" value="default" class="primary">保存</button>
      </menu>
    </form>
  </dialog>

  <button id="quickIdeaBtn" class="quick-idea-btn">＋アイデア</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
